<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>前测估价</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,"PingFang SC",sans-serif;background:#f5f5f5;
         display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
    .card{background:white;border-radius:16px;padding:32px;width:100%;max-width:480px;
          box-shadow:0 4px 20px rgba(0,0,0,0.08)}
    .progress{font-size:13px;color:#999;margin-bottom:10px;text-align:center}
    .bar-wrap{background:#eee;border-radius:99px;height:6px;margin-bottom:24px}
    .bar{background:#4f6ef7;height:6px;border-radius:99px;transition:width .3s}
    img{width:100%;max-height:260px;object-fit:contain;border-radius:10px;background:#fafafa;
        transition:opacity .15s}
    h2{font-size:18px;color:#1a1a1a;margin:16px 0 8px;text-align:center}
    .label{font-size:13px;color:#666;text-align:center;margin-bottom:20px}
    input[type=range]{width:100%;accent-color:#4f6ef7;cursor:pointer}
    .value-display{text-align:center;font-size:28px;font-weight:700;color:#4f6ef7;margin:8px 0 4px}
    .unit{text-align:center;font-size:13px;color:#999;margin-bottom:24px}
    button{width:100%;padding:13px;background:#4f6ef7;color:white;border:none;
           border-radius:10px;font-size:15px;cursor:pointer;transition:background .15s}
    button:hover{background:#3a56d4}
    button:disabled{background:#aaa;cursor:not-allowed}
  </style>
</head>
<body>
<div class="card">
  <div class="progress" id="prog">1 / {{ total }}</div>
  <div class="bar-wrap"><div class="bar" id="bar" style="width:0%"></div></div>
  <img id="img" src="" alt="">
  <h2 id="name"></h2>
  <div class="label">您认为这个商品值多少代币？</div>
  <input type="range" id="slider" min="1" max="500" value="250"
         oninput="document.getElementById('val').textContent=this.value">
  <div class="value-display" id="val">250</div>
  <div class="unit">代币</div>
  <button id="btn" onclick="next()">下一个</button>
</div>

<script>
const products = {{ products_json|safe }};
const total    = products.length;
let idx = 0;
const ratings = [];

function show(i) {
  const p = products[i];
  document.getElementById('prog').textContent = `${i+1} / ${total}`;
  document.getElementById('bar').style.width  = `${Math.round((i+1)/total*100)}%`;
  const img = document.getElementById('img');
  img.style.opacity = 0;
  img.src = p.img;
  img.onload = () => { img.style.opacity = 1; };
  document.getElementById('name').textContent   = p.name;
  document.getElementById('slider').value       = 250;
  document.getElementById('val').textContent    = 250;
  document.getElementById('btn').textContent    = i < total-1 ? '下一个' : '开始实验';
}

function next() {
  const value = document.getElementById('slider').value;
  ratings.push({ name: products[idx].name, value: parseInt(value) });
  idx++;
  if (idx < total) {
    show(idx);
  } else {
    // 全部完成，一次性提交
    document.getElementById('btn').disabled = true;
    document.getElementById('btn').textContent = '提交中…';
    fetch('/api/pre-rating', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(ratings)
    })
    .then(r => r.json())
    .then(d => { window.location.href = d.redirect; })
    .catch(() => {
      document.getElementById('btn').disabled = false;
      document.getElementById('btn').textContent = '提交失败，重试';
    });
  }
}

show(0);
</script>
</body>
</html>
