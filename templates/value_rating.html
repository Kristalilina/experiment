<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>商品估价</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,"PingFang SC",sans-serif;background:#f5f5f5;
         display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
    .card{background:white;border-radius:16px;padding:32px;width:100%;max-width:480px;
          box-shadow:0 4px 20px rgba(0,0,0,0.08)}
    img{width:100%;max-height:220px;object-fit:contain;border-radius:10px;background:#fafafa}
    h2{font-size:17px;color:#1a1a1a;margin:14px 0 6px;text-align:center}
    .label{font-size:14px;color:#666;text-align:center;margin:14px 0 20px}
    input[type=range]{width:100%;accent-color:#4f6ef7;cursor:pointer}
    .value-display{text-align:center;font-size:32px;font-weight:700;color:#4f6ef7;margin:8px 0 4px}
    .unit{text-align:center;font-size:13px;color:#999;margin-bottom:24px}
    .range-labels{display:flex;justify-content:space-between;font-size:12px;color:#999;margin-bottom:4px}
    button{width:100%;padding:13px;background:#4f6ef7;color:white;border:none;
           border-radius:10px;font-size:15px;cursor:pointer}
    button:hover{background:#3a56d4}
  </style>
</head>
<body>
<div class="card">
  <img src="{{ product.img }}" alt="{{ product.name }}">
  <h2>{{ product.name }}</h2>
  <div class="label">与客服交流之后，您认为这个商品值多少代币？</div>

  <form method="POST">
    <div class="range-labels"><span>1</span><span>500</span></div>
    <input type="range" name="value_rating" min="1" max="500" value="250" id="slider"
           oninput="document.getElementById('val').textContent=this.value">
    <div class="value-display" id="val">250</div>
    <div class="unit">代币</div>
    <button type="submit">下一个商品</button>
  </form>
</div>
</body>
</html>
